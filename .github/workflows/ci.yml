name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pharmanp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    if: github.repository == 'prateekbhujel/pharmanp'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, dom, fileinfo, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: php artisan test
