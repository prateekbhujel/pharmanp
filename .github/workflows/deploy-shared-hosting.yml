name: Deploy shared hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pharmanp-shared-hosting
  cancel-in-progress: true

jobs:
  deploy:
    name: Test, build and deploy
    runs-on: ubuntu-latest
    if: github.repository == 'prateekbhujel/pharmanp'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        run: |
          git fetch --tags --force
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_VALUE="${GITHUB_REF_NAME}"
          else
            VERSION_VALUE="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          fi
          if [ -z "$VERSION_VALUE" ]; then
            VERSION_VALUE="dev-${GITHUB_SHA::7}"
          fi
          printf '%s\n' "$VERSION_VALUE" > VERSION

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, dom, fileinfo, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: php artisan test

      - name: Optimize Composer autoloader for production
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.phpunit.result.cache' \
            --exclude='.vite' \
            --exclude='.vscode' \
            --exclude='.env' \
            --exclude='database/*.sqlite' \
            --exclude='node_modules' \
            --exclude='public/hot' \
            --exclude='public/storage' \
            --exclude='storage/app' \
            --exclude='storage/framework' \
            --exclude='storage/logs' \
            -czf /tmp/pharmanp-release.tar.gz .

      - name: Upload release archive
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$SSH_USER"
          test -n "$SSH_HOST"
          test -n "$DEPLOY_PATH"
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -i ~/.ssh/deploy_key -P "${SSH_PORT}" /tmp/pharmanp-release.tar.gz "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/release.tar.gz"

      - name: Finalize remote Laravel app
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "cd '${DEPLOY_PATH}' && \
            tar -tzf release.tar.gz >/dev/null && \
            find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'database' \
              ! -name 'storage' \
              ! -name 'cgi-bin' \
              ! -name '.well-known' \
              ! -name 'release.tar.gz' \
              -exec rm -rf {} + && \
            tar -xzf release.tar.gz && \
            rm -f release.tar.gz public/hot public/storage && \
            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache database && \
            touch database/database.sqlite && \
            php artisan migrate --force && \
            php artisan storage:link || true && \
            php artisan config:clear && \
            php artisan route:clear && \
            php artisan view:clear && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache"
