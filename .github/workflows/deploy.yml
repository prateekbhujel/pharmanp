name: Deploy → pharmanp.pratikbhujel.com.np

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. PHP setup ─────────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, zip, gd
          coverage: none

      # ── 3. Node setup ────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. PHP deps ──────────────────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 5. Node deps + build ─────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
        env:
          NODE_ENV: production

      # ── 6. Create deployment archive ─────────────────────────────────────────
      - name: Create release archive
        run: |
          tar -czf release.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='*.sqlite' \
            --exclude='.env' \
            --exclude='.env.example' \
            .

      # ── 7. Upload archive + deploy script to server ──────────────────────────
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "release.tar.gz,deploy.sh,scripts/server-bootstrap.sh"
          target: ~/deploy/pharmanp/

      # ── 8. Make scripts executable then deploy ───────────────────────────────
      - name: Run deployment script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            # Bootstrap once if first deploy
            if [ ! -d ~/deploy/pharmanp/releases ]; then
              chmod +x ~/deploy/pharmanp/scripts/server-bootstrap.sh
              bash ~/deploy/pharmanp/scripts/server-bootstrap.sh
            fi
            chmod +x ~/deploy/pharmanp/deploy.sh
            bash ~/deploy/pharmanp/deploy.sh

